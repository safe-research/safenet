name: integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      SAFENET_TEST_VERBOSE: "1"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # We fix the foundry version because of a formatting bug introduced
          # in version 1.7.0.
          # See <https://github.com/foundry-rs/foundry/issues/13362>
          version: v1.5.1

      - run: npm ci
      - run: npm run test:integration

  sentinel-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # We fix the foundry version because of a formatting bug introduced
          # in version 1.7.0.
          # See <https://github.com/foundry-rs/foundry/issues/13362>
          version: v1.5.1

      - run: npm ci
      - run: npm run test:integration:sentinel

      - name: Upload sentinel logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-integration-logs
          path: |
            anvil_sentinel_logs.txt
            sentinel_a_logs.txt
            sentinel_b_logs.txt
          if-no-files-found: ignore
