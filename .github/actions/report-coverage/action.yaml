name: "Report Coverage"
description: "Merges coverage reports and outputs them as a step summary or artifact for downstream comment posting"
inputs:
  post-as-step-summary:
    description: "Post the report as a workflow step summary (safe for fork PRs)"
    required: false
    default: "false"
  upload-artifact:
    description: "Upload the report as an artifact so a downstream privileged workflow can post it as a PR comment"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    # --- Dependencies for this action ---
    # We install lcov here so the main workflow doesn't have to know about it
    - name: Install LCOV
      shell: bash
      run: |
        # We clone the repository as the version via apt-get is faulty
        echo "⬇️ Cloning LCOV repository..."
        git clone https://github.com/linux-test-project/lcov.git /tmp/lcov
        cd /tmp/lcov

        # Checkout the specific commit hash
        echo "📍 Checking out commit 1.16..."
        git checkout dfeb7505ef372f806ddb280b52a90f41cd8169cd

        sudo make install

        # Verify version to be sure
        lcov --version

        # Cleanup
        cd ..
        rm -rf /tmp/lcov

    - name: Process Coverage Files
      id: process_coverage
      shell: bash
      run: |
        MERGE_ARGS=()
        # Initialize Markdown Table Header
        # We use \n for newlines which we will interpret later
        REPORT_TABLE="| Package | Coverage |\n| :--- | :--- |"

        # Process a single LCOV tracefile: optionally rewrite its source paths
        # to be relative to the repository root, collect per-package stats, add
        # a table row and queue it for the final merge.
        # Usage: process_lcov <lcov-file> <display-name> [path-prefix]
        process_lcov() {
          local lcov_file="$1"
          local display_name="$2"
          local path_prefix="${3:-}"

          # --- A. Fix Paths ---
          # Some tools emit source paths relative to the package directory.
          # Prepend the package path so they resolve from the repository root.
          # Example: SF:src/utils.ts -> SF:validator/src/utils.ts
          if [ -n "$path_prefix" ]; then
            sed -i "s|^SF:|SF:$path_prefix/|g" "$lcov_file"
          fi

          # --- B. Get Individual Stats ---
          # Run lcov summary on this specific file and extract the percentage
          # (e.g. "85.4%").
          local stats
          stats=$(lcov --summary "$lcov_file" | grep "lines......" | cut -d ':' -f 2 | xargs)

          echo "   📊 $display_name: $stats"
          lcov --list "$lcov_file"

          # Append row to table and add to the merge list.
          REPORT_TABLE="${REPORT_TABLE}\n| **${display_name}** | ${stats} |"
          MERGE_ARGS+=(--add-tracefile "$lcov_file")
        }

        # 1. Get workspace patterns from package.json (e.g., "packages/*", "apps/web")
        # We use -r for raw output to remove quotes
        WORKSPACE_PATTERNS=$(jq -r '.workspaces[]' package.json)

        echo "🔍 Scanning workspaces defined in package.json..."

        # 2. Loop through patterns and expand globs
        for pattern in $WORKSPACE_PATTERNS; do

          # Force shell expansion of the glob (e.g., packages/* -> packages/a packages/b)
          for pkg in $pattern; do

            # Check if it is actually a directory
            if [ -d "$pkg" ]; then

              # Standardized Location: {package}/coverage/lcov.info
              LCOV_FILE="$pkg/coverage/lcov.info"

              if [ -f "$LCOV_FILE" ]; then
                echo "✅ Found coverage: $LCOV_FILE"
                process_lcov "$LCOV_FILE" "$(basename "$pkg")" "$pkg"
              else
                echo "⚪️ No coverage found for $pkg (Skipping)"
              fi
            fi
          done
        done

        # 3. Scan Rust crates (crates/*)
        # Unlike the JavaScript reports, the Rust LCOV files are generated with
        # paths already relative to the repository root, so no prefix rewrite is
        # needed. Crates are labelled by their Cargo package name.
        echo "🔍 Scanning Rust crates in crates/*..."
        for manifest in crates/*/Cargo.toml; do
          [ -f "$manifest" ] || continue

          crate=$(dirname "$manifest")
          LCOV_FILE="$crate/coverage/lcov.info"

          if [ -f "$LCOV_FILE" ]; then
            echo "✅ Found coverage: $LCOV_FILE"
            CRATE_NAME=$(grep -m1 '^name' "$manifest" | cut -d '"' -f 2)
            process_lcov "$LCOV_FILE" "$CRATE_NAME"
          else
            echo "⚪️ No coverage found for $crate (Skipping)"
          fi
        done

        # 4. Merge
        if [ -z "$MERGE_ARGS" ]; then
           echo "❌ No coverage files found in any workspace!"
           exit 1
        fi

        echo "🔗 Merging all reports..."
        lcov "${MERGE_ARGS[@]}" --output-file lcov.info

        # 5. Get Total Summary
        OUTPUT=$(lcov --summary lcov.info)
        TOTAL_STATS=$(echo "$OUTPUT" | grep "lines......" | cut -d ':' -f 2 | xargs)

        # 6. Get File List
        # Grep -v removes the "Reading tracefile" noise
        FILE_LIST=$(lcov --list lcov.info | grep -v "Reading tracefile")

        # 7. Export step outputs
        echo "TOTAL_STATS=$TOTAL_STATS" >> $GITHUB_OUTPUT

        echo "SUMMARY<<EOF" >> $GITHUB_OUTPUT
        echo -e "$REPORT_TABLE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "DETAILS<<EOF" >> $GITHUB_OUTPUT
        echo "$FILE_LIST" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # 8. Build report file
        # Variables are used directly here (no template interpolation) to avoid
        # URL-encoding of newlines and unintended shell expansion in heredocs.
        {
          echo "<!-- coverage-report -->"
          echo "### 🛡️ Test Coverage Report"
          echo ""
          echo "**Total Line Coverage:** ${TOTAL_STATS}"
          echo ""
          echo -e "$REPORT_TABLE"
          echo ""
          echo "<details>"
          echo "<summary><strong>📄 Click to view coverage for all files</strong></summary>"
          echo ""
          echo '```text'
          echo "${FILE_LIST}"
          echo '```'
          echo ""
          echo "</details>"
        } > coverage-report.md

    - name: Post Coverage Step Summary
      if: ${{ inputs.post-as-step-summary == 'true' }}
      shell: bash
      run: cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

    - name: Prepare Coverage Artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      shell: bash
      run: |
        PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
        if [ "$PR_NUMBER" = "null" ] || [ -z "$PR_NUMBER" ]; then
          echo "❌ upload-artifact requires a pull_request event context."
          exit 1
        fi
        echo "$PR_NUMBER" > issue-number.txt

    - name: Upload Coverage Artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: coverage-comment
        path: |
          coverage-report.md
          issue-number.txt
